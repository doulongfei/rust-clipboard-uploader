name: CI / Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rust-clipboard-uploader-linux
            binary: target/release/rust-clipboard-uploader
          - os: macos-latest
            artifact: rust-clipboard-uploader-macos
            binary: target/release/rust-clipboard-uploader
          - os: windows-latest
            artifact: rust-clipboard-uploader-windows
            binary: target/release/rust-clipboard-uploader.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-icccm4-dev libxcb-image0-dev libxcb-keysyms1-dev \
            libxcb-randr0-dev libxcb-xtest0-dev libxcb-glx0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev libwayland-egl-backend-dev \
            libssl-dev libgtk-3-dev \
            libegl1-mesa-dev libgles2-mesa-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/rust-clipboard-uploader-linux/rust-clipboard-uploader
            artifacts/rust-clipboard-uploader-macos/rust-clipboard-uploader
            artifacts/rust-clipboard-uploader-windows/rust-clipboard-uploader.exe
