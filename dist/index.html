<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>剪贴板上传工具 - 配置</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial; padding: 20px; }
    label { display:block; margin-top:10px; }
    input[type=text], textarea { width:100%; padding:8px; box-sizing:border-box }
    button { margin-top:12px; padding:8px 12px }
    .status { margin-top:10px; color: #666 }
  </style>
</head>
<body>
  <h1>剪贴板上传工具 - 配置页面</h1>
  <div>
    <label>上传地址（upload_url）
      <input id="upload_url" type="text" />
    </label>
    <label>方法（method，POST/PUT）
      <input id="method" type="text" />
    </label>
    <label>文件字段（file_field）
      <input id="file_field" type="text" />
    </label>
    <label>响应解析（response，text 或 json.path）
      <input id="response" type="text" />
    </label>
    <label>
      <input id="copy_to_clipboard" type="checkbox"/> 上传成功后复制链接到剪贴板
    </label>
    <div>
      <button id="save">保存配置</button>
      <span id="status" class="status"></span>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
